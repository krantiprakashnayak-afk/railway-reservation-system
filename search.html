<!DOCTYPE html>
<html>

<head>
<title>Search Train</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>Search Train</h1>

<form action="results.html">

<label>From</label>
<input type="text" name="from" placeholder="Source station">

<label>To</label>
<input type="text" name="to" placeholder="Destination station">

<label>Date</label>
<input type="date" name="date">

<label>Class</label>

<input type="radio" name="class"> Sleeper
<input type="radio" name="class"> AC
<input type="radio" name="class"> General

<br><br>

<button type="submit">Search Train</button>

</form>

</body>
</html>
