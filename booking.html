<!DOCTYPE html>
<html>

<head>
<title>Book Ticket</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>Book Ticket</h1>

<h2>Train Details</h2>

<p><b>Train:</b> Konark Express</p>
<p><b>From:</b> Bhubaneswar</p>
<p><b>To:</b> Kolkata</p>
<p><b>Date:</b> 20 March 2026</p>

<hr>

<h2>Passenger Details</h2>

<form action="ticket.html">

<label>Name</label>
<input type="text" required>

<label>Age</label>
<input type="number" required>

<label>Gender</label>
<br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female

<br><br>

<label>Class</label>
<br>

<input type="radio" name="class"> Sleeper
<input type="radio" name="class"> AC
<input type="radio" name="class"> General

<br><br>

<button type="submit">Confirm Booking</button>

</form>

</body>
</html>
